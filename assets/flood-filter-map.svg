<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Flood to filter to map</title>
  <desc id="desc">Raw flood passes through a filter and becomes a partial map; two different maps cover different ground.</desc>
  <rect width="720" height="220" fill="#F4F1EA"/>
  <!-- Flood -->
  <rect x="24" y="48" width="140" height="124" rx="10" fill="#D9E2EC"/>
  <text x="94" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1C2430">Raw flood</text>
  <text x="94" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5A6573">more than fits</text>
  <!-- Arrow 1 -->
  <path d="M176 110 H218" stroke="#1C2430" stroke-width="2" fill="none"/>
  <path d="M210 102 L222 110 L210 118" fill="#1C2430"/>
  <!-- Filter -->
  <rect x="230" y="48" width="140" height="124" rx="10" fill="#2A6F6A"/>
  <text x="300" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#F4F1EA">Filter</text>
  <text x="300" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#D7EBE9">selects · drops · warps</text>
  <!-- Arrow 2 -->
  <path d="M382 110 H424" stroke="#1C2430" stroke-width="2" fill="none"/>
  <path d="M416 102 L428 110 L416 118" fill="#1C2430"/>
  <!-- Map -->
  <rect x="436" y="48" width="140" height="124" rx="10" fill="#1C2430"/>
  <text x="506" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#F4F1EA">Partial map</text>
  <text x="506" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#B8C0CA">usable sketch</text>
  <!-- Second map hint -->
  <rect x="592" y="70" width="104" height="80" rx="10" fill="none" stroke="#C45C26" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="644" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#C45C26">Other map</text>
  <text x="644" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#C45C26">different edges</text>
</svg>
