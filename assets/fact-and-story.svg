<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">Fact and story layers</title>
  <desc id="desc">The raw event sits under an optional narrative layer that is easy to amplify.</desc>
  <rect width="720" height="180" fill="#F4F1EA"/>
  <rect x="80" y="36" width="560" height="52" rx="10" fill="#E8D5DA" stroke="#8B2942" stroke-width="1.5"/>
  <text x="360" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8B2942">Story on top</text>
  <text x="360" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8B2942">optional · easy to amplify · often where extra harm lives</text>
  <rect x="80" y="100" width="560" height="52" rx="10" fill="#1C2430"/>
  <text x="360" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#F4F1EA">What happened</text>
  <text x="360" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#B8C0CA">raw event · hard to avoid · help with facts here</text>
</svg>
