<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" role="img" aria-labelledby="title desc">
  <title id="title">Fact and story layers</title>
  <desc id="desc">The raw event sits under an optional narrative layer that is easy to amplify.</desc>
  <rect width="760" height="240" rx="16" fill="#EDE8DF"/>
  <rect x="16" y="16" width="728" height="208" rx="12" fill="#F7F4EE"/>
  <rect x="100" y="48" width="560" height="56" rx="10" fill="#E8D5DA" stroke="#8B2942" stroke-width="1.5"/>
  <text x="380" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8B2942">Story on top</text>
  <text x="380" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8B2942">optional - easy to amplify - often where extra harm lives</text>
  <rect x="100" y="120" width="560" height="56" rx="10" fill="#1C2430"/>
  <text x="380" y="144" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#F4F1EA">What happened</text>
  <text x="380" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#B8C0CA">raw event - hard to avoid - help with facts here</text>
</svg>
