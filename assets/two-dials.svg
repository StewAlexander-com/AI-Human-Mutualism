<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">Two dials</title>
  <desc id="desc">Gratitude dial stays constant for time spent. Resolution dial varies with signal quality. Mixing them causes tolerance or contempt.</desc>
  <rect width="720" height="240" fill="#F4F1EA"/>
  <!-- Dial 1 -->
  <circle cx="160" cy="110" r="70" fill="#FFFFFF" stroke="#2A6F6A" stroke-width="3"/>
  <circle cx="160" cy="110" r="8" fill="#2A6F6A"/>
  <line x1="160" y1="110" x2="160" y2="55" stroke="#2A6F6A" stroke-width="4" stroke-linecap="round"/>
  <text x="160" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2A6F6A">Gratitude</text>
  <text x="160" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5A6573">time spent Ę constant</text>
  <!-- Dial 2 -->
  <circle cx="360" cy="110" r="70" fill="#FFFFFF" stroke="#C45C26" stroke-width="3"/>
  <circle cx="360" cy="110" r="8" fill="#C45C26"/>
  <line x1="360" y1="110" x2="410" y2="70" stroke="#C45C26" stroke-width="4" stroke-linecap="round"/>
  <text x="360" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#C45C26">Resolution</text>
  <text x="360" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5A6573">signal quality Ę variable</text>
  <!-- Collapse warning -->
  <rect x="470" y="40" width="226" height="140" rx="12" fill="#FFFFFF" stroke="#D0D5DC"/>
  <text x="583" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#1C2430">One knob?</text>
  <text x="583" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B2942">Accept everything</text>
  <text x="583" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5A6573">Æ naive tolerance</text>
  <text x="583" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B2942">Reject everything</text>
  <text x="583" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5A6573">Æ contempt</text>
</svg>
