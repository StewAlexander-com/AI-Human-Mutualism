<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Two dials</title>
  <desc id="desc">Gratitude dial stays constant for time spent. Resolution dial varies with signal quality. Mixing them causes tolerance or contempt.</desc>
  <rect width="760" height="300" rx="16" fill="#EDE8DF"/>
  <rect x="16" y="16" width="728" height="268" rx="12" fill="#F7F4EE"/>
  <circle cx="180" cy="130" r="70" fill="#FFFFFF" stroke="#2A6F6A" stroke-width="3"/>
  <circle cx="180" cy="130" r="8" fill="#2A6F6A"/>
  <line x1="180" y1="130" x2="180" y2="75" stroke="#2A6F6A" stroke-width="4" stroke-linecap="round"/>
  <text x="180" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2A6F6A">Gratitude</text>
  <text x="180" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5A6573">time spent - constant</text>
  <circle cx="380" cy="130" r="70" fill="#FFFFFF" stroke="#C45C26" stroke-width="3"/>
  <circle cx="380" cy="130" r="8" fill="#C45C26"/>
  <line x1="380" y1="130" x2="430" y2="90" stroke="#C45C26" stroke-width="4" stroke-linecap="round"/>
  <text x="380" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#C45C26">Resolution</text>
  <text x="380" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5A6573">signal quality - variable</text>
  <rect x="490" y="60" width="226" height="140" rx="12" fill="#FFFFFF" stroke="#D0D5DC"/>
  <text x="603" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#1C2430">One knob?</text>
  <text x="603" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B2942">Accept everything</text>
  <text x="603" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5A6573">-&gt; naive tolerance</text>
  <text x="603" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B2942">Reject everything</text>
  <text x="603" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5A6573">-&gt; contempt</text>
</svg>
